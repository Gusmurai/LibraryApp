reader.add=INSERT INTO readers (last_name, first_name, patronymic, birth_date, passport_series, passport_number, address, phone, photo) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)
reader.update=UPDATE readers SET last_name = ?, first_name = ?, patronymic = ?, birth_date = ?, passport_series = ?, passport_number = ?, address = ?, phone = ?, photo = ? WHERE ticket_number = ?
reader.findByTicketNumber=SELECT * FROM readers WHERE ticket_number = ?
reader.findAll=SELECT * FROM readers ORDER BY last_name ASC
reader.search=SELECT * FROM readers WHERE (CAST(ticket_number AS TEXT) = ? OR (last_name || ' ' || first_name || ' ' || COALESCE(patronymic, '')) ILIKE ?)
reader.changeStatus=CALL sp_change_reader_status(?)

# Books catalog
book.add=INSERT INTO books (isbn, title, publication_year, page_count, bbk, author_mark, publisher_id, cover_image) VALUES (?, ?, ?, ?, ?, ?, ?, ?)
book.update=UPDATE books SET title = ?, publication_year = ?, page_count = ?, bbk = ?, author_mark = ?, publisher_id = ?, cover_image = ? WHERE isbn = ?
book.findByIsbn=SELECT * FROM books WHERE isbn = ?
book.findAll=SELECT * FROM view_book_catalog ORDER BY title
book.search=SELECT * FROM view_book_catalog WHERE isbn ILIKE ? OR title ILIKE ? OR authors ILIKE ? OR genres ILIKE ? ORDER BY title
book.changeStatus=CALL sp_change_book_status(?)
book.availableCount=SELECT available_copies FROM view_book_catalog WHERE isbn = ?
book.totalCount=SELECT total_copies FROM view_book_catalog WHERE isbn = ?
book.authorsByIsbn=SELECT a.* FROM authors a JOIN book_authors ba ON a.author_id = ba.author_id WHERE ba.isbn = ? ORDER BY a.last_name
book.genresByIsbn=SELECT g.* FROM genres g JOIN book_genres bg ON g.genre_id = bg.genre_id WHERE bg.isbn = ? ORDER BY g.name
book.deleteAuthors=DELETE FROM book_authors WHERE isbn = ?
book.insertAuthor=INSERT INTO book_authors (isbn, author_id) VALUES (?, ?)
book.deleteGenres=DELETE FROM book_genres WHERE isbn = ?
book.insertGenre=INSERT INTO book_genres (isbn, genre_id) VALUES (?, ?)

# Catalog dictionaries
author.findAll=SELECT * FROM authors ORDER BY last_name
author.findById=SELECT * FROM authors WHERE author_id = ?
author.findByLastName=SELECT * FROM authors WHERE last_name ILIKE ?
genre.findAll=SELECT * FROM genres ORDER BY name
genre.findById=SELECT * FROM genres WHERE genre_id = ?
publisher.findAll=SELECT * FROM publishers ORDER BY name
publisher.findById=SELECT * FROM publishers WHERE publisher_id = ?
supplier.findAll=SELECT * FROM suppliers ORDER BY name
supplier.findByInn=SELECT * FROM suppliers WHERE inn = ?

# \u0412\u044B\u0434\u0430\u0447\u0430 / \u0412\u043E\u0437\u0432\u0440\u0430\u0442
lending.searchReaders=SELECT * FROM readers WHERE (CAST(ticket_number AS TEXT) = ? OR last_name ILIKE ? OR phone ILIKE ?)
lending.findActiveByReader=SELECT v.*, lib.db_login AS librarian_login FROM view_current_lendings v LEFT JOIN lendings len ON len.lending_id = v.lending_id LEFT JOIN librarians lib ON lib.tabel_number = len.tabel_number WHERE v.ticket_number = ?
lending.findUnpaidFines=SELECT * FROM view_unpaid_fines WHERE ticket_number = ?
lending.issueBook=CALL sp_issue_book(?, ?, ?)
lending.returnBook=CALL sp_return_book(?, ?, ?)
lending.closeReturn=UPDATE lendings SET return_date = CURRENT_DATE WHERE lending_id = ? AND return_date IS NULL
lending.renewBook=CALL sp_extend_book(?)
lending.markAsLost=UPDATE lendings SET return_date = CURRENT_DATE WHERE lending_id = ?
lending.historyByInventoryNumber=SELECT v.*, lib.db_login AS librarian_login FROM view_copy_history v LEFT JOIN lendings len ON len.inventory_number = v.inventory_number AND len.ticket_number = v.ticket_number AND len.lend_date = v.lend_date LEFT JOIN librarians lib ON lib.tabel_number = len.tabel_number WHERE v.inventory_number = ? ORDER BY v.lend_date DESC
lending.historyByReader=SELECT v.*, lib.db_login AS librarian_login FROM view_reader_history v LEFT JOIN lendings len ON len.inventory_number = v.inventory_number AND len.ticket_number = v.ticket_number AND len.lend_date = v.lend_date LEFT JOIN librarians lib ON lib.tabel_number = len.tabel_number WHERE v.ticket_number = ? ORDER BY v.lend_date DESC

# \u041F\u043E\u0438\u0441\u043A \u043A\u043D\u0438\u0433 \u0434\u043B\u044F \u0432\u044B\u0434\u0430\u0447\u0438 (\u0447\u0435\u0440\u0435\u0437 View)
book.searchSelection=SELECT * FROM view_book_catalog WHERE (isbn ILIKE ? OR title ILIKE ? OR authors ILIKE ?)
book.getCopies=SELECT * FROM view_copies_status WHERE isbn = ?

# \u0421\u043B\u0443\u0436\u0435\u0431\u043D\u043E\u0435: \u043F\u043E\u0438\u0441\u043A \u0442\u0430\u0431\u0435\u043B\u044C\u043D\u043E\u0433\u043E \u043D\u043E\u043C\u0435\u0440\u0430 \u043F\u043E \u043B\u043E\u0433\u0438\u043D\u0443 \u0421\u0423\u0411\u0414
librarian.findByLogin=SELECT tabel_number FROM librarians WHERE db_login = ?
librarian.findFullByLogin=SELECT * FROM librarians WHERE db_login = ?
audit.findRecent=SELECT * FROM audit_log ORDER BY operation_time DESC LIMIT ?

# \u042D\u043A\u0437\u0435\u043C\u043F\u043B\u044F\u0440\u044B (\u041D\u041E\u0412\u042B\u0415)
copy.findByIsbn=SELECT * FROM view_copies_status WHERE isbn = ?
copy.findByInv=SELECT * FROM copies WHERE inventory_number = ?
# \u041F\u043E\u0438\u0441\u043A \u044D\u043A\u0437\u0435\u043C\u043F\u043B\u044F\u0440\u043E\u0432 \u0434\u043B\u044F \u0432\u044B\u0434\u0430\u0447\u0438: \u0442\u043E\u043B\u044C\u043A\u043E \u0442\u0435, \u0447\u0442\u043E \u0444\u0438\u0437\u0438\u0447\u0435\u0441\u043A\u0438 \u043D\u0430 \u043F\u043E\u043B\u043A\u0435
copy.searchAvailable=SELECT * FROM view_copies_status \
                     WHERE isbn = ? \
                     AND CAST(inventory_number AS TEXT) ILIKE ? \
                     AND status = '\u0412 \u043D\u0430\u043B\u0438\u0447\u0438\u0438'
copy.addBatch=INSERT INTO copies (isbn, cost) VALUES (?, ?)
copy.writeOff=CALL sp_write_off_copy(?, ?, ?)

# Deliveries
delivery.insertCopy=INSERT INTO copies (isbn, cost) VALUES (?, ?) RETURNING inventory_number
delivery.insert=INSERT INTO deliveries (supplier_inn, inventory_number, delivery_date) VALUES (?, ?, CURRENT_DATE)
delivery.findAll=SELECT * FROM deliveries ORDER BY delivery_date DESC
delivery.findWithFilters.base=SELECT * FROM deliveries WHERE 1=1
delivery.filter.start= AND delivery_date >= ?
delivery.filter.end= AND delivery_date <= ?
delivery.filter.supplier= AND supplier_inn = ?
delivery.order= ORDER BY delivery_date DESC

# Fines
fine.findUnpaidByReader=SELECT v.*, f.lending_id, f.article_id FROM view_all_fines_extended v JOIN fines f ON f.fine_id = v.fine_id WHERE v.ticket_number = ? AND v.is_paid = FALSE ORDER BY v.issue_date DESC
fine.findWithFilters.base=SELECT v.*, f.lending_id, f.article_id FROM view_all_fines_extended v JOIN fines f ON f.fine_id = v.fine_id WHERE 1=1
fine.findWithFilters.query= AND (v.reader_fullname ILIKE ? OR v.book_title ILIKE ? OR CAST(v.ticket_number AS TEXT) = ?)
fine.findWithFilters.startDate= AND v.issue_date >= ?
fine.findWithFilters.endDate= AND v.issue_date <= ?
fine.findWithFilters.article= AND v.fine_id IN (SELECT fine_id FROM fines WHERE article_id = ?)
fine.findWithFilters.paid= AND v.is_paid = ?
fine.findWithFilters.order= ORDER BY v.issue_date DESC, v.fine_id DESC
fine.create=CALL sp_create_fine(?, ?, ?, ?)
fine.findLastCreated=SELECT fine_id FROM fines WHERE lending_id = ? AND article_id = ? ORDER BY fine_id DESC LIMIT 1
fine.pay=CALL sp_pay_fine(?)
fine.updateNote=UPDATE fines SET comment = ? WHERE fine_id = ?
fine.updateAmount=CALL sp_update_fine_amount(?, ?)
fine.annul=CALL sp_annul_fine(?, ?)
fine.calculate=SELECT fn_calculate_fine_amount(?, ?, ?)
fine.overdueDays=SELECT CASE WHEN due_date < CURRENT_DATE THEN (CURRENT_DATE - due_date)::INT ELSE 0 END FROM lendings WHERE lending_id = ?
fine.copyCostByLending=SELECT c.cost FROM lendings l JOIN copies c ON l.inventory_number = c.inventory_number WHERE l.lending_id = ?
fine.copyCostByLendingNewSchema=SELECT c.cost FROM lendings l JOIN copies c ON l.copy_inventory_number = c.inventory_number WHERE l.lending_id = ?
fineArticle.findAll=SELECT * FROM fine_articles ORDER BY article_id
fineArticle.findById=SELECT * FROM fine_articles WHERE article_id = ?

# Reservations
reservation.create=CALL sp_create_reservation(?, ?, ?)
reservation.cancel=UPDATE reservations SET reservation_status = FALSE WHERE reservation_id = ?
reservation.findWithFilters.base=SELECT v.*, lib.db_login AS librarian_login FROM view_reservations_info v LEFT JOIN reservations res ON res.reservation_id = v.reservation_id LEFT JOIN librarians lib ON lib.tabel_number = res.tabel_number WHERE 1=1
reservation.findWithFilters.query= AND (v.book_title ILIKE ? OR v.reader_name ILIKE ? OR CAST(v.ticket_number AS TEXT) = ?)
reservation.findWithFilters.status= AND v.status_text = ?
reservation.findWithFilters.order= ORDER BY v.reservation_date DESC, v.reservation_id DESC
reservation.hasActive=SELECT 1 FROM reservations WHERE ticket_number = ? AND isbn = ? AND reservation_status = TRUE AND expiry_date >= CURRENT_DATE
reservation.hasActiveNewSchema=SELECT 1 FROM reservations WHERE reader_ticket_number = ? AND book_isbn = ? AND reservation_status = TRUE AND expiry_date >= CURRENT_DATE

# Write-offs
writeOff.create=CALL sp_write_off_copy(?, ?, ?)
writeOff.findWithFilters.base=SELECT v.*, lib.db_login AS librarian_login FROM view_write_offs_full v LEFT JOIN write_offs w ON w.write_off_id = v.write_off_id LEFT JOIN librarians lib ON lib.tabel_number = w.tabel_number WHERE 1=1
writeOff.findWithFilters.query= AND (v.book_title ILIKE ? OR CAST(v.inventory_number AS TEXT) ILIKE ? OR v.isbn ILIKE ?)
writeOff.findWithFilters.startDate= AND v.write_off_date >= ?
writeOff.findWithFilters.endDate= AND v.write_off_date <= ?
writeOff.findWithFilters.order= ORDER BY v.write_off_date DESC, v.write_off_id DESC
writeOff.restore=CALL sp_restore_copy(?)
writeOff.createWithComment=INSERT INTO write_offs (inventory_number, tabel_number, reason_id, write_off_date, comment) VALUES (?, ?, ?, CURRENT_DATE, ?)
writeOffReason.findAll=SELECT * FROM write_off_reasons ORDER BY reason_id
writeOffReason.findById=SELECT * FROM write_off_reasons WHERE reason_id = ?

# Reports
report.reader_activity=SELECT * FROM get_report_reader_activity(?, ?)
report.debtors=SELECT * FROM get_report_debtors()
report.popular_books=SELECT * FROM get_report_popular_books(?, ?)
report.unpaid_fines=SELECT * FROM get_report_unpaid_fines_list(?, ?)
report.fund_state=SELECT * FROM get_report_fund_state()
report.write_offs=SELECT * FROM get_report_write_offs_list(?, ?)
report.deliveries=SELECT * FROM get_report_deliveries_list(?, ?)

# Compatibility fallbacks for older/newer DB schemas
lending.historyByInventoryNumberNewSchema=SELECT l.lending_id, l.copy_inventory_number AS inventory_number, l.reader_ticket_number AS ticket_number, l.librarian_tabel_number AS tabel_number, l.lend_date, l.due_date, l.return_date, l.renewals_count, (r.last_name || ' ' || r.first_name || ' ' || COALESCE(r.patronymic, '')) AS reader_fullname, r.phone AS reader_phone, COALESCE(lib.db_login, lib.last_name || ' ' || lib.first_name) AS librarian_login FROM lendings l JOIN readers r ON r.ticket_number = l.reader_ticket_number LEFT JOIN librarians lib ON lib.tabel_number = l.librarian_tabel_number WHERE l.copy_inventory_number = ? ORDER BY l.lend_date DESC
lending.historyByReaderNewSchema=SELECT l.lending_id, l.copy_inventory_number AS inventory_number, l.reader_ticket_number AS ticket_number, l.librarian_tabel_number AS tabel_number, l.lend_date, l.due_date, l.return_date, l.renewals_count, b.title AS book_title, COALESCE(lib.db_login, lib.last_name || ' ' || lib.first_name) AS librarian_login FROM lendings l JOIN copies c ON c.inventory_number = l.copy_inventory_number JOIN books b ON b.isbn = c.isbn LEFT JOIN librarians lib ON lib.tabel_number = l.librarian_tabel_number WHERE l.reader_ticket_number = ? ORDER BY l.lend_date DESC

